services:
  - type: web
    name: nicoll-commentaries-app
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_WRITE_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: nicoll-commentaries-db
          property: connectionString

databases:
  - name: nicoll-commentaries-db
    plan: free
